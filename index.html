<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>БизнесУчёт — Система учёта для малого бизнеса</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    body {
      background: #0f172a;
      color: #e2e8f0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    
    .card {
      background: #1e2937;
      border: 1px solid #334155;
      border-radius: 12px;
    }
    
    .header {
      border-bottom: 1px solid #334155;
    }
    
    .btn-primary {
      background: #3b82f6;
      transition: all 0.2s;
    }
    
    .btn-primary:hover {
      background: #2563eb;
    }
    
    table thead {
      background: #1e2937;
      border-bottom: 2px solid #475569;
    }
    
    input, select {
      background: #1e2937;
      border: 1px solid #475569;
      color: #e2e8f0;
    }
    
    input:focus, select:focus {
      border-color: #3b82f6;
      outline: none;
    }
  </style>
</head>
<body class="min-h-screen">
  <div class="max-w-5xl mx-auto p-8">
    <!-- шапка -->
    <div class="header py-6 mb-8">
      <div class="flex justify-between items-center">
        <div>
          <h1 class="text-4xl font-semibold text-white">Бизнес учёт</h1>
          <p class="text-slate-400 mt-1">уроки плавания для собак</p>
        </div>
      </div>
    </div>

    <!-- баланс -->
    <div class="card p-8 mb-8">
      <div class="flex justify-between items-center">
        <div>
          <p class="text-slate-400 text-sm">Текущий баланс</p>
          <p id="balance" class="text-5xl font-semibold text-white">0 ₽</p>
        </div>
        <div class="flex gap-12">
          <div>
            <p class="text-emerald-400 text-sm">Доходы</p>
            <p id="totalIncome" class="text-2xl font-medium text-emerald-400">0 ₽</p>
          </div>
          <div>
            <p class="text-rose-400 text-sm">Расходы</p>
            <p id="totalExpense" class="text-2xl font-medium text-rose-400">0 ₽</p>
          </div>
        </div>
      </div>
    </div>

    <!-- форма добавления -->
    <div class="card p-8 mb-8">
      <h2 class="text-xl font-medium mb-6">Новая операция</h2>
      <form id="transactionForm" class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <label class="block text-slate-400 text-sm mb-2">Дата</label>
          <input type="date" id="date" class="w-full px-4 py-3 rounded-lg">
        </div>
        <div>
          <label class="block text-slate-400 text-sm mb-2">Тип операции</label>
          <select id="type" class="w-full px-4 py-3 rounded-lg">
            <option value="income">Доход</option>
            <option value="expense">Расход</option>
          </select>
        </div>
        <div>
          <label class="block text-slate-400 text-sm mb-2">Сумма (₽)</label>
          <input type="number" id="amount" class="w-full px-4 py-3 rounded-lg">
        </div>
        <div>
          <label class="block text-slate-400 text-sm mb-2">Категория</label>
          <select id="category" class="w-full px-4 py-3 rounded-lg"></select>
        </div>
        <div class="md:col-span-2">
          <label class="block text-slate-400 text-sm mb-2">Описание</label>
          <input type="text" id="description" placeholder="Краткое описание операции" class="w-full px-4 py-3 rounded-lg">
        </div>
        <button type="submit" class="btn-primary text-white font-medium py-4 rounded-lg md:col-span-2">Добавить операцию</button>
      </form>
    </div>

    <!-- таблица -->
    <div class="card p-8">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-xl font-medium">История операций</h2>
        <select id="filter" class="px-5 py-2 bg-[#1e2937] border border-slate-600 rounded-lg">
          <option value="all">Все операции</option>
          <option value="income">Только доходы</option>
          <option value="expense">Только расходы</option>
        </select>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full" id="transactionsTable">
          <thead>
            <tr>
              <th class="p-4 text-left text-slate-400">Дата</th>
              <th class="p-4 text-left text-slate-400">Тип</th>
              <th class="p-4 text-left text-slate-400">Категория</th>
              <th class="p-4 text-left text-slate-400">Описание</th>
              <th class="p-4 text-right text-slate-400">Сумма</th>
              <th class="w-10"></th>
            </tr>
          </thead>
          <tbody id="tableBody" class="divide-y divide-slate-700"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    let transactions = JSON.parse(localStorage.getItem('transactions')) || [];

    const categories = {
      income: ["Продажи товаров", "Услуги", "Инвестиции", "Возврат долга", "Другое"],
      expense: ["Аренда", "Зарплата сотрудникам", "Реклама", "Материалы", "Транспорт", "Налоги", "Другое"]
    };

    function populateCategories() {
      const select = document.getElementById('category');
      const type = document.getElementById('type').value;
      select.innerHTML = '';
      categories[type].forEach(cat => {
        const opt = document.createElement('option');
        opt.value = cat;
        opt.textContent = cat;
        select.appendChild(opt);
      });
    }

    document.getElementById('type').addEventListener('change', populateCategories);
    populateCategories();

    function calculateTotals() {
      let income = 0, expense = 0;
      transactions.forEach(t => t.type === 'income' ? income += +t.amount : expense += +t.amount);
      document.getElementById('totalIncome').textContent = income.toLocaleString('ru-RU') + ' ₽';
      document.getElementById('totalExpense').textContent = expense.toLocaleString('ru-RU') + ' ₽';
      document.getElementById('balance').textContent = (income - expense).toLocaleString('ru-RU') + ' ₽';
    }

    function renderTable(filter = 'all') {
      const tbody = document.getElementById('tableBody');
      tbody.innerHTML = '';
      const filtered = transactions.filter(t => filter === 'all' || t.type === filter);
      filtered.forEach(t => {
        const row = document.createElement('tr');
        row.className = 'hover:bg-slate-800';
        row.innerHTML = `
          <td class="p-4">${t.date}</td>
          <td class="p-4 font-medium ${t.type === 'income' ? 'text-emerald-400' : 'text-rose-400'}">${t.type === 'income' ? 'ДОХОД' : 'РАСХОД'}</td>
          <td class="p-4">${t.category}</td>
          <td class="p-4">${t.description || '-'}</td>
          <td class="p-4 text-right font-medium ${t.type === 'income' ? 'text-emerald-400' : 'text-rose-400'}">
            ${t.type === 'income' ? '+' : '-'}${parseFloat(t.amount).toLocaleString('ru-RU')} ₽
          </td>
          <td class="p-4">
            <button onclick="deleteTransaction(${t.id})" class="text-slate-400 hover:text-rose-400"><i class="fas fa-trash"></i></button>
          </td>
        `;
        tbody.appendChild(row);
      });
    }

    window.deleteTransaction = function(id) {
      transactions = transactions.filter(t => t.id !== id);
      localStorage.setItem('transactions', JSON.stringify(transactions));
      calculateTotals();
      renderTable(document.getElementById('filter').value);
    };

    document.getElementById('transactionForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const newTrans = {
        id: Date.now(),
        date: document.getElementById('date').value || new Date().toISOString().split('T')[0],
        type: document.getElementById('type').value,
        amount: document.getElementById('amount').value,
        category: document.getElementById('category').value,
        description: document.getElementById('description').value
      };
      transactions.unshift(newTrans);
      localStorage.setItem('transactions', JSON.stringify(transactions));
      calculateTotals();
      renderTable(document.getElementById('filter').value);
      this.reset();
      populateCategories();
    });

    document.getElementById('filter').addEventListener('change', (e) => renderTable(e.target.value));

    calculateTotals();
    renderTable();
  </script>
</body>
</html>
